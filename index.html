<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetY</title>
    <link href="/src/style.css" rel="stylesheet">
</head>
<body>
  <header class="relative bg-cover bg-center py-10" style="background-image: linear-gradient(rgba(0,0,0,.5), rgba(0,0,0,.5)), url('https://plus.unsplash.com/premium_photo-1721979418259-b32d7de74637?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');">
    <div class="mx-auto max-w-4xl px-4 text-center text-white">
      <p class="text-3xl">Available budget in <span id="budget-month">...</span>:</p>
      <h1 id="balance" class="mt-4 text-6xl font-light">- 0.00</h1>
      <div class="mx-auto mt-8 max-w-xl space-y-3">
        <div class="flex items-center justify-between bg-cyan-500 px-6 py-4">
          <span class="uppercase">Income</span>
          <span id="income" class="text-2xl">+ 0.00</span>
        </div>
        <div class="flex items-center justify-between bg-red-500 px-6 py-4">
          <span class="uppercase">Expenses</span>
          <div class="gap-4">
            <span id="expense-percent" class="rounded bg-red-300 px-2 py-1 text-sm">--</span>
            <span id="expense" class="text-2xl">- 0.00</span>
          </div>
        </div>
      </div>
    </div>
  </header>
  <section class="py-5">
    <div class="mx-auto max-w-4xl flex flex-col gap-3 px-4 md:flex-row md:justify-center">
      <select id="transaction-type" class="rounded border border-slate-300 px-4 py-3">
        <option value="income">+</option>
        <option value="expense">-</option>
      </select>
      <input id="transaction-description" type="text" placeholder="Add description" class="rounded border border-slate-300 px-4 py-3">
      <input id="transaction-value" type="number" placeholder="Value" class="rounded border border-slate-300 px-4 py-3">
      <button id="add-btn" class="rounded border bg-red-500 text-white px-4 py-3 hover:bg-red-300">Add</button>
    </div>
  </section>
  <main class="mx-auto max-w-6xl px-4 py-10">
    <div class="grid gap-10 lg:grid-cols-2">
      <section>
        <h2 class="mb-6 text-2xl uppercase text-cyan-500">Income</h2>
        <select id="income-filter" class="mb-4 rounded border border-slate-300 px-4 py-3">
          <option value="">All</option>
        </select>
        <ul id="income-list" class="space-y-3"></ul>
      </section>
      <section>
        <h2 class="mb-6 text-2xl uppercase text-red-500">Expenses</h2>
        <select id="expense-filter" class="mb-4 rounded border border-slate-300 px-4 py-3">
          <option value="">All</option>
        </select>
        <ul id="expense-list" class="space-y-3"></ul>
      </section>
    </div>
  </main>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
